# Sample config.yml file
historical-prices:
  period: 100
  interval: "1m"
refresh-interval: 10  # seconds between price checks (default: 10)
tendency:
  interval: "3m"
  direction: "up"
indicators:
  rsi:
    interval: "5m"
    length: 14
    upper-limit: 70
    middle-limit: 50
    lower-limit: 30
  dema:
    length: 9
  macd:
    fast-length: 12
    slow-length: 26
    signal-length: 9
  bollinger-bands:
    length: 20
    multiplier: 2.0
  atr:
    period: 14
  adx:
    period: 14
    threshold: 25     # minimum ADX for trade entry
  volume:
    ma-period: 20     # volume moving average period
trailing-stop:
  enabled: true
  activation-pct: 1.5  # activate after 1.5% profit
  trailing-pct: 1.0    # trail by 1.0% from peak

# AI multi-agent configuration
# API keys are read from environment variables:
#   OPENAI_API_KEY, DEEPSEEK_API_KEY, ANTHROPIC_API_KEY
ai:
  enabled: true
  providers:
    openai:
      model: "gpt-4o-mini"        # free-tier friendly
    deepseek:
      model: "deepseek-chat"       # free tier available
    claude:
      model: "claude-3-5-haiku-20241022"  # most affordable Claude
  min-confidence: 0.5              # minimum AI confidence to act on signal

# Top gainers monitor configuration
top-gainers:
  quote-asset: "USDT"              # filter pairs ending with this asset
  limit: 20                        # number of top gainers to display
  poll-interval: 60                # seconds between each poll
  min-volume: 1000000              # minimum 24h quote volume to include
  exclude-symbols:                 # symbols to exclude from results
    - "USDCUSDT"
